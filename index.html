<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>댕댕로드</title>
</head>
<body>

<button onclick="kakaoLogin()">카카오 로그인</button>

<script>
const SERVER = location.origin.includes('localhost')
  ? 'http://localhost:3000'
  : 'https://daengdaengroad-production.up.railway.app';

function kakaoLogin(){
  location.href = SERVER + '/auth/kakao';
}

window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);

  if (params.get('login') === 'success') {
    const kakaoId = params.get('kakaoId');

    if (kakaoId) {
      try {
        const res = await fetch(SERVER + '/api/user/' + encodeURIComponent(kakaoId));
        const data = await res.json();

        if (data.user) {
          localStorage.setItem('daengdaeng_dog', JSON.stringify(data.user));
          alert('로그인 성공');
        }
      } catch(e){
        alert('유저 불러오기 실패');
      }
    }

    history.replaceState({}, '', '/');
  }
});
</script>

</body>
</html>
